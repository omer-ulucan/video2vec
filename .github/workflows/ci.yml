name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libavcodec-dev libavformat-dev \
            libavutil-dev libswscale-dev libswresample-dev libspdlog-dev \
            nlohmann-json3-dev libyaml-cpp-dev libvips-dev libtesseract-dev \
            libleptonica-dev libgtest-dev libbenchmark-dev python3-pip git wget
      - name: Cache custom dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps/whisper-build
            deps/whisper-src
            deps/onnxruntime-linux-x64-1.18.0
            deps/tesseract-5.5.2
            deps/leptonica-build
            deps/leptonica-1.87.0
            tests/models
          key: ${{ runner.os }}-deps-${{ hashFiles('scripts/ci-setup-deps.sh') }}
      - name: Setup custom dependencies
        run: scripts/ci-setup-deps.sh
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=ON
      - name: Build
        run: cmake --build build --parallel $(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Format check
        run: |
          sudo apt-get install -y clang-format
          find src include tests examples -name '*.cpp' -o -name '*.hpp' | xargs clang-format --dry-run --Werror

  build-linux-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libavcodec-dev libavformat-dev \
            libavutil-dev libswscale-dev libswresample-dev libspdlog-dev \
            nlohmann-json3-dev libyaml-cpp-dev libvips-dev libtesseract-dev \
            libleptonica-dev libgtest-dev libbenchmark-dev python3-pip git wget
      - name: Cache custom dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps/whisper-build
            deps/whisper-src
            deps/onnxruntime-linux-x64-1.18.0
            deps/tesseract-5.5.2
            deps/leptonica-build
            deps/leptonica-1.87.0
            tests/models
          key: ${{ runner.os }}-deps-${{ hashFiles('scripts/ci-setup-deps.sh') }}
      - name: Setup custom dependencies
        run: scripts/ci-setup-deps.sh
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
      - name: Build
        run: cmake --build build --parallel $(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libavcodec-dev libavformat-dev \
            libavutil-dev libswscale-dev libswresample-dev libspdlog-dev \
            nlohmann-json3-dev libyaml-cpp-dev libgtest-dev python3-pip git wget
      - name: Cache custom dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps/whisper-build
            deps/whisper-src
            deps/onnxruntime-linux-x64-1.18.0
            deps/tesseract-5.5.2
            deps/leptonica-build
            deps/leptonica-1.87.0
            tests/models
          key: ${{ runner.os }}-deps-${{ hashFiles('scripts/ci-setup-deps.sh') }}
      - name: Setup custom dependencies
        run: scripts/ci-setup-deps.sh
      - name: Configure ASan
        run: cmake -B build -DENABLE_ASAN=ON -DCMAKE_BUILD_TYPE=Debug
      - name: Build ASan
        run: cmake --build build --parallel $(nproc)
      - name: Test ASan
        run: ctest --test-dir build --output-on-failure
      - name: Configure UBSan
        run: cmake -B build_ub -DENABLE_UBSAN=ON -DCMAKE_BUILD_TYPE=Debug
      - name: Build UBSan
        run: cmake --build build_ub --parallel $(nproc)
      - name: Test UBSan
        run: ctest --test-dir build_ub --output-on-failure
